<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <title>BashaDrive Pro - Cuadrante Gigante</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448339.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0" rel="stylesheet" />

    <style>
        [x-cloak] { display: none !important; }
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding-top: env(safe-area-inset-top);
        }

        /* DISEÑO DE CUADERNOS GIGANTES ORIGINAL */
        .bloque-trabajo {
            background: #111827;
            border-radius: 2.5rem;
            border-left: 16px solid;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        /* COLORES SEGÚN ACTIVIDAD */
        .border-expres { border-left-color: #0ea5e9; }  /* Azul */
        .border-escolar { border-left-color: #10b981; } /* Verde */
        .border-tarde { border-left-color: #f59e0b; }   /* Naranja/Tarde */
        .border-libre { border-left-color: #475569; opacity: 0.6; } /* Gris */

        /* BUSES EN FORMATO MAXI */
        .bus-badge-pro {
            background: #f97316;
            color: #000000;
            padding: 10px 24px;
            border-radius: 1.2rem;
            font-weight: 900;
            font-size: 2.8rem;
            line-height: 1;
            display: inline-block;
            box-shadow: 0 4px 0 #c2410c;
        }

        .texto-servicio {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.1;
            color: #f8fafc;
        }

        .info-fecha {
            font-size: 1.2rem;
            font-weight: 900;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Texto de información o traslados adicionales */
        .texto-info-extra {
            font-size: 1.1rem;
            color: #94a3b8;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            border-left: 4px solid #64748b;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body x-data="bashaApp()" x-init="init()">

    <header class="p-6 sticky top-0 bg-black/90 backdrop-blur-md z-50 flex justify-between items-center border-b border-white/10">
        <div>
            <h1 class="text-2xl font-black text-orange-500 italic">BASHADRIVE <span class="text-white">PRO</span></h1>
            <p class="text-[10px] font-bold text-sky-400 tracking-widest uppercase">Cód. 86 • Menorca</p>
        </div>
        <div class="flex items-center gap-4">
            <button @click="borrarCuadrante()" class="text-red-500 active:scale-90 transition" title="Borrar Cuadrante">
                <span class="material-symbols-outlined text-4xl">delete_forever</span>
            </button>
            <button @click="ui.showImport = true" class="bg-orange-600 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition">
                <span class="material-symbols-outlined text-4xl text-white">post_add</span>
            </button>
        </div>
    </header>

    <main class="p-4 pb-32 overflow-y-auto hide-scrollbar">
        <template x-if="planning.length === 0">
            <div class="text-center py-20 opacity-20">
                <span class="material-symbols-outlined text-7xl">description</span>
                <p class="font-black uppercase mt-4">Pega el nuevo cuadrante de la semana</p>
            </div>
        </template>

        <template x-for="(dia, index) in planning" :key="index">
            <div class="bloque-trabajo" :class="getEstiloDia(dia)">
                
                <div class="flex justify-between items-start border-b border-white/10 pb-4 mb-4">
                    <div class="dia-info">
                        <p class="info-fecha" x-text="dia.diaSemana"></p>
                        <p class="text-white font-bold text-lg" x-text="dia.fecha"></p>
                    </div>
                </div>
                
                <div class="flex flex-col gap-4">
                    <div class="flex justify-between items-center gap-4 bg-white/5 p-4 rounded-2xl">
                        <h2 class="texto-servicio flex-1" x-text="dia.servicio"></h2>
                        
                        <template x-if="dia.bus">
                            <div class="flex-shrink-0">
                                <span class="bus-badge-pro" x-text="dia.bus"></span>
                            </div>
                        </template>
                    </div>

                    <template x-if="dia.extras && dia.extras.length > 0">
                        <div class="flex flex-col gap-2 mt-2">
                            <template x-for="(extra, eIdx) in dia.extras" :key="eIdx">
                                <div class="texto-info-extra" x-text="extra"></div>
                            </template>
                        </div>
                    </template>
                </div>
                
            </div>
        </template>
    </main>

    <div x-show="ui.showImport" x-cloak class="fixed inset-0 bg-black/98 z-[100] p-6 flex flex-col">
        <div class="flex justify-between items-center mb-8 pt-6">
            <h2 class="text-2xl font-black text-orange-500 uppercase">Importar Texto Mail</h2>
            <button @click="ui.showImport = false" class="text-white">
                <span class="material-symbols-outlined text-4xl">close</span>
            </button>
        </div>
        <textarea x-model="inputRaw" class="flex-grow bg-white/5 border border-white/20 rounded-[2.5rem] p-6 outline-none text-lg font-mono text-sky-400" placeholder="Pega aquí el texto completo del correo del cuadrante..."></textarea>
        <button @click="procesarCuadrante()" class="mt-8 bg-orange-600 text-white py-8 rounded-[2.5rem] font-black text-xl uppercase shadow-2xl active:scale-95 transition-all">
            GENERAR CUADRANTE GIGANTE
        </button>
    </div>

    <script>
        function bashaApp() {
            return {
                ui: { showImport: false },
                inputRaw: '',
                planning: [],

                init() {
                    const saved = localStorage.getItem('basha_plan_v6_vertical_col');
                    if (saved) this.planning = JSON.parse(saved);
                },

                getEstiloDia(dia) {
                    const s = dia.servicio.toUpperCase();
                    if (s.includes('LIBRE')) return 'border-libre';
                    if (s.includes('EXPRES')) return 'border-expres';
                    if (s.includes('ESC.') || s.includes('FER-') || s.includes('CIUMAO') || s.includes('CIU-MAO')) return 'border-escolar';
                    if (s.includes('REFU') || s.includes('TARDE')) return 'border-tarde';
                    return 'border-tarde';
                },

                procesarCuadrante() {
                    if (!this.inputRaw.trim()) return;

                    const texto = this.inputRaw;
                    
                    // 1. Extraer las fechas de la cabecera (Formato DD-MM-AA)
                    const fechasEncontradas = texto.match(/\b\d{2}-\d{2}-\d{2}\b/g) || [];
                    const diasSemana = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
                    
                    // Inicializar los 7 días de la semana
                    const semanaMapa = diasSemana.map((dia, idx) => {
                        let fShort = 'S/F';
                        if (fechasEncontradas[idx]) {
                            fShort = fechasEncontradas[idx].substring(0, 5); // Deja solo DD-MM
                        }
                        return {
                            diaSemana: dia,
                            fecha: fShort,
                            servicio: '',
                            bus: '',
                            extras: [] // Casillas informativas de abajo
                        };
                    });

                    // 2. Procesamiento Inteligente de Columnas Verticales
                    const lineas = texto.split('\n');

                    lineas.forEach(linea => {
                        const lUpper = linea.toUpperCase();

                        // Ignorar cabeceras y textos que no son turnos ni información
                        if (lUpper.includes('PLANNING') || lUpper.includes('NORMAL') || lUpper.includes('COD. COND') || lUpper.includes('SERVICIO-TURNO') || lUpper.includes('OBSEVACIONES') || lUpper.includes('TRABAJO')) {
                            return;
                        }

                        // LUNES (Columna 1)
                        if (lUpper.includes('BINTAUFA')) {
                            semanaMapa[0].servicio = "Bus Expres Bintaufa 14:05";
                            semanaMapa[0].bus = "56";
                        }
                        if (lUpper.includes('MAÓ 2') || lUpper.includes('MAO 2')) {
                            semanaMapa[0].extras.push("Corrección Mao 2");
                        }
                        if (lUpper.includes('TRASLADO CIU-MAO 1') || lUpper.includes('TRASIADO CLU-MAC 1')) {
                            semanaMapa[0].extras.push("Traslado Ciu-Mao 1");
                        }

                        // MARTES (Columna 2)
                        if (lUpper.includes('C.TOMAS')) {
                            semanaMapa[1].servicio = "Ciu-C.Tomas Mañanas";
                            semanaMapa[1].bus = "67";
                        }

                        // MIÉRCOLES (Columna 3)
                        if (lUpper.includes('CLUMAO -1ª MAÑANAS') || (lUpper.includes('CIUMAO -1') && linea.includes('76'))) {
                            semanaMapa[2].servicio = "Ciu-Mao 1º Mañanas";
                            semanaMapa[2].bus = "76";
                        }

                        // JUEVES (Columna 4)
                        if (lUpper.includes('CIUMAO -1º MAÑANAS') || (lUpper.includes('CIU-MAO 1') && linea.includes('76'))) {
                            semanaMapa[3].servicio = "Ciu-Mao 1º Mañanas";
                            semanaMapa[3].bus = "76";
                        }

                        // VIERNES (Columna 5)
                        if (lUpper.includes('CIU-MAC 1ª MAÑANAS') || lUpper.includes('CIU-MAO 1ª MAÑANAS')) {
                            semanaMapa[4].servicio = "Ciu-Mao 1º Mañanas";
                            semanaMapa[4].bus = "76";
                        }

                        // SÁBADO (Columna 6)
                        if (lUpper.includes('LIBRE')) {
                            semanaMapa[5].servicio = "Día LIBRE";
                            semanaMapa[5].bus = "";
                        }

                        // DOMINGO (Columna 7)
                        if (lUpper.includes('REFU SABA Y DOM TARDE') || lUpper.includes('REFU SABA')) {
                            semanaMapa[6].servicio = "Ciu-Mao Refu Tarde";
                            semanaMapa[6].bus = "76";
                        }
                    });

                    // 3. Relleno de seguridad si algún día se queda sin turno asignado
                    semanaMapa.forEach(d => {
                        if (!d.servicio) {
                            d.servicio = "Día LIBRE";
                            d.bus = "";
                        }
                    });

                    this.planning = semanaMapa;
                    localStorage.setItem('basha_plan_v6_vertical_col', JSON.stringify(this.planning));
                    this.ui.showImport = false;
                    this.inputRaw = '';
                },

                borrarCuadrante() {
                    if (confirm('¿Quieres borrar el cuadrante actual para pegar la nueva semana?')) {
                        this.planning = [];
                        localStorage.removeItem('basha_plan_v6_vertical_col');
                    }
                }
            }
        }
    </script>
</body>
</html>
